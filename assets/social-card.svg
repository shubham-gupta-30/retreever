<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='630' viewBox='0 0 1200 630' role='img' aria-labelledby='title desc'>
  <title id='title'>ReTreever social card</title>
  <desc id='desc'>ReTreever: Hierarchical Retrieval at Scale, ICML 2026. Fast like dense retrieval, inspectable like a hierarchy, no LLM calls.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop stop-color='#eef4ff'/><stop offset='.55' stop-color='#f8fbff'/><stop offset='1' stop-color='#fff7ed'/></linearGradient>
    <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop stop-color='#2463eb'/><stop offset='1' stop-color='#7c3aed'/></linearGradient>
    <filter id='shadow'><feDropShadow dx='0' dy='24' stdDeviation='26' flood-color='#1e3a8a' flood-opacity='.18'/></filter>
  </defs>
  <rect width='1200' height='630' fill='url(#bg)'/>
  <rect x='54' y='54' width='1092' height='522' rx='42' fill='white' opacity='.86' filter='url(#shadow)'/>
  <text x='96' y='130' font-family='Inter, Arial, sans-serif' font-size='34' font-weight='900' fill='#2463eb' letter-spacing='5'>ICML 2026</text>
  <text x='96' y='230' font-family='Inter, Arial, sans-serif' font-size='86' font-weight='950' fill='#111827' letter-spacing='-5'>ReTreever</text>
  <text x='96' y='298' font-family='Inter, Arial, sans-serif' font-size='42' font-weight='800' fill='#243047'>Hierarchical Retrieval at Scale</text>
  <text x='96' y='370' font-family='Inter, Arial, sans-serif' font-size='31' fill='#526070'>Fast like dense retrieval. Inspectable like a hierarchy.</text>
  <text x='96' y='414' font-family='Inter, Arial, sans-serif' font-size='31' fill='#526070'>No LLM calls for tree construction or search.</text>
  <g transform='translate(752 116)'>
    <path d='M178 38 L82 142 L40 256 M178 38 L274 142 L316 256 M82 142 L138 256 M274 142 L218 256' fill='none' stroke='#cbd5e1' stroke-width='10' stroke-linecap='round'/>
    <circle cx='178' cy='38' r='32' fill='url(#g)'/>
    <circle cx='82' cy='142' r='30' fill='#5b7cfa'/>
    <circle cx='274' cy='142' r='30' fill='#7c3aed'/>
    <circle cx='40' cy='256' r='26' fill='#14b8a6'/>
