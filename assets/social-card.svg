    <rect x='96' y='476' width='160' height='70' rx='24' fill='#eef2ff'/><text x='124' y='520' font-size='34' fill='#2463eb'>160×</text>
    <rect x='278' y='476' width='215' height='70' rx='24' fill='#eef2ff'/><text x='306' y='520' font-size='34' fill='#2463eb'>+20.7</text>
    <rect x='516' y='476' width='170' height='70' rx='24' fill='#eef2ff'/><text x='544' y='520' font-size='34' fill='#2463eb'>9.9ms</text>
