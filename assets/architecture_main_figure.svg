  <title id="title">ReTreever architecture and traversal</title>
  <desc id="desc">Main method figure adapted from the camera-ready paper: a frozen bi-encoder maps query and context to embeddings, then a differentiable tree organizer routes both to leaf-assignment vectors optimized by contrastive loss.</desc>
